name: Release artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Test
        run: go test ./...
      - name: Build portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { '0.1.0-dev' }
          go build -trimpath -ldflags "-s -w -X main.version=$version" -o dist/ranch-hand-windows-amd64.exe ./cmd/ranch-hand
          (Get-FileHash dist/ranch-hand-windows-amd64.exe -Algorithm SHA256).Hash.ToLower() + '  ranch-hand-windows-amd64.exe' | Set-Content dist/ranch-hand-windows-amd64.exe.sha256 -Encoding ascii
      - name: Attest executable
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ranch-hand-windows-amd64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ranch-hand-windows-amd64
          path: dist/*
          if-no-files-found: error
      - name: Upload tagged release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:GITHUB_REF_NAME dist/* --clobber
